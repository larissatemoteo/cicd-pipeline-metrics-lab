name: CI Sequential

# Mesma carga de trabalho do CI Parallel, porem com jobs encadeados via needs.
# Serve para comparar tempo total de parede entre execucao sequencial e paralela.
# Disparar manualmente com os mesmos inputs do CI Parallel para uma comparacao justa.

on:
  workflow_dispatch:
    inputs:
      test_scale:
        description: "Multiplica a quantidade de testes"
        type: choice
        options: ["1", "2", "4", "8"]
        default: "1"
      slow_test:
        description: "Habilita um teste lento"
        type: boolean
        default: false
      fail_test:
        description: "Introduz falha de teste controlada"
        type: boolean
        default: false
      disable_cache:
        description: "Desativa o cache de dependencias"
        type: boolean
        default: false

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache pip
        if: ${{ github.event.inputs.disable_cache != 'true' }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check .

  typecheck:
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache pip
        if: ${{ github.event.inputs.disable_cache != 'true' }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Type check (mypy)
        run: mypy

  test:
    needs: [typecheck]
    runs-on: ubuntu-latest
    env:
      TEST_SCALE: ${{ inputs.test_scale || '1' }}
      ENABLE_SLOW_TEST: ${{ inputs.slow_test || 'false' }}
      INTRODUCE_FAILURE: ${{ inputs.fail_test || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache pip
        if: ${{ github.event.inputs.disable_cache != 'true' }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Testes (pytest + JUnit)
        run: |
          mkdir -p reports
          pytest --junitxml=reports/junit.xml
      - name: Resumir metricas de teste
        if: ${{ always() }}
        run: python scripts/summarize_tests.py reports/junit.xml reports/pipeline-metrics.json
      - name: Upload do artefato com resultados
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: reports/

  build:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache pip
        if: ${{ github.event.inputs.disable_cache != 'true' }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Build do pacote
        run: python -m build
      - name: Upload do artefato de build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
